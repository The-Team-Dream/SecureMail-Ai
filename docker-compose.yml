# ════════════════════════════════════════════════════════════════════════════
# SecureMail-Ai — STANDALONE docker-compose
# Runs the AI gRPC service independently (no other services required)
# Usage: cd SecureMail-Ai && docker compose up --build
# ════════════════════════════════════════════════════════════════════════════

services:
  ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securemail-ai
    env_file: .env.standalone
    ports:
      - "50051:50051"

    # ── Healthcheck: TCP probe on gRPC port ──────────────────────────────────
    # Uses Python's built-in socket module — no extra tools needed in the image
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import socket, sys; s=socket.socket(); s.settimeout(3); r=s.connect_ex(('localhost', 50051)); s.close(); sys.exit(r)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

    # Resource limits (prevent runaway LLM calls from starving the host)
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
